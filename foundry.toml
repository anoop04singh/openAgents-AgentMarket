[profile.default]
src            = "contracts"
out            = "out"
libs           = ["lib"]
test           = "tests/contracts"
script         = "scripts"
solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true
remappings     = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
sepolia  = "${SEPOLIA_RPC_URL}"
zg_galileo = "https://evmrpc-testnet.0g.ai"
zg_main    = "https://evmrpc.0g.ai"

[etherscan]
sepolia = { key = "${ETHERSCAN_KEY}", url = "https://api-sepolia.etherscan.io/api" }

[fmt]
line_length              = 100
tab_width                = 4
bracket_spacing          = true
int_types                = "long"
multiline_func_header    = "all"
quote_style              = "double"
number_underscore        = "thousands"
wrap_comments            = true
ignore                   = ["lib/"]
